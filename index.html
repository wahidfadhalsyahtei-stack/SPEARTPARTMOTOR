<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

header{
background:#ee4d2d;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:120px;
}

/* SEARCH */

.search{
width:90%;
max-width:400px;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

/* CONTAINER */

.container{
padding:15px;
}

/* GRID PRODUK */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

/* CARD PRODUK */

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:14px;
margin:8px 0;
}

.btn{
display:inline-block;
background:#ee4d2d;
color:white;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
font-size:13px;
}

.btn:hover{
background:#ff6a4d;
}

h2{
margin-top:25px;
}

</style>

</head>

<script>

function cariMotor(){
let input=document.getElementById("search").value.toLowerCase();
let card=document.getElementsByClassName("card");

for(let i=0;i<card.length;i++){
let text=card[i].innerText.toLowerCase();

if(text.includes(input)){
card[i].style.display="";
}else{
card[i].style.display="none";
}
}

}

</script>
